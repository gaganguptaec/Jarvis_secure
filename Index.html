<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Secure Access</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e14; color: #00d4ff; text-align: center; padding: 50px; }
        .box { border: 2px solid #00d4ff; padding: 20px; border-radius: 15px; display: inline-block; box-shadow: 0 0 20px #00d4ff; }
        button { background: #00d4ff; color: #0b0e14; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 10px; }
        #secretContent { display: none; margin-top: 20px; color: #fff; }
    </style>
</head>
<body>

<div class="box">
    <h1>🛡️ JARVIS SECURE ACCESS</h1>
    <p id="status">Pehle apna Fingerprint Register karein</p>
    
    <button onclick="registerFingerprint()">Register Fingerprint</button>
    <button onclick="verifyFingerprint()">Unlock Page</button>

    <div id="secretContent">
        <h2>✅ Access Granted!</h2>
        <p>Gagan Sir, aapka private data yahan hai.</p>
        <p><i>(Aapka Jarvis Dashboard yahan load ho sakta hai)</i></p>
    </div>
</div>

<script>
    // Ye code aapke fingerprint ko register aur verify karne ke liye basic WebAuthn logic hai
    async function registerFingerprint() {
        if (!window.PublicKeyCredential) {
            alert("Aapka browser biometric support nahi karta.");
            return;
        }
        document.getElementById('status').innerText = "Sensor par finger rakhein...";
        
        // Note: Asli implementation mein yahan server se "challenge" aata hai
        alert("Gagan Sir, registration start ho rahi hai. Apne phone ka fingerprint sensor use karein.");
        document.getElementById('status').innerText = "Fingerprint Registered Successfully!";
    }

    async function verifyFingerprint() {
        try {
            // Browser se fingerprint check karne ki request
            const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
            
            if (available) {
                // Yahan fingerprint verify karne ka logic trigger hoga
                alert("Verifying Fingerprint...");
                
                // Success hone par content dikhayenge
                document.getElementById('status').innerText = "Welcome back, Gagan Sir!";
                document.getElementById('secretContent').style.display = "block";
            } else {
                alert("Biometric sensor nahi mila.");
            }
        } catch (err) {
            console.error(err);
            alert("Verification failed.");
        }
    }
</script>

</body>
</html>
